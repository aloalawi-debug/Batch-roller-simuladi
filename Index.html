<script>
// Auto-rotate camera untuk showcase
let autoRotate = true;
function showcaseMode() {
    if(autoRotate) {
        camera.position.x = Math.sin(Date.now() * 0.0005) * 8;
        camera.position.z = Math.cos(Date.now() * 0.0005) * 8;
        camera.lookAt(0, 1, 0);
    }
}

// Demo sequence
function runDemo() {
    setTimeout(() => toggleHeater(), 1000);
    setTimeout(() => loadBatch(), 8000);
    setTimeout(() => { document.getElementById('speedSlider').value = 20; updateSpeed(20); }, 10000);
    setTimeout(() => toggleMachine(), 12000);
}
</script>
